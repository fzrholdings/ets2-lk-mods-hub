name: Sync Mods - Cloudflare Bypass

on:
  schedule:
    # දිනකට වරක් උදේ 10:30 ට (Sri Lanka Time) Auto Run වීමට
    - cron: '00 5 * * *'
  workflow_dispatch:  # GitHub Actions Tab එකෙන් Manualව Run කිරීමට

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. ඔබගේ Repository Code එක Pull කරගැනීම
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python Environment එක Setup කිරීම
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. අවශ්‍ය Python Libraries (cloudscraper, firebase-admin) Install කිරීම
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper firebase-admin

      # 4. Firebase Secret එක Environment Variable එකකට Pass කිරීම
      #    (මෙමගින් Script එකට ඔබගේ Firebase Service Account Key එක හමුවේ)
      - name: Run sync script
        env:
          FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        # 5. Python Script එක Run කිරීම
        run: python3 .github/scripts/sync_mods.py