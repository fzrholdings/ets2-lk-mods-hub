name: Sync Mods - Cloudflare Bypass

on:
  schedule:
    - cron: '00 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper firebase-admin

      - name: Debug secret length
        env:
          SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          echo "Secret length: ${#SECRET}"
          echo "First 30 chars: ${SECRET:0:30}"
          echo "Last 30 chars: ${SECRET: -30}"

      - name: Run sync script
        env:
          FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: python3 .github/scripts/sync_mods.py