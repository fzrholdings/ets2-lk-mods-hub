name: Sync Mods from RSS (JSON)

on:
  schedule:
    - cron: '30 4 * * *'   # දිනකට වරක් උදේ 10:00 ලංකාවට
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install cloudscraper

      - name: Run sync script
        run: python3 .github/scripts/sync_mods.py

      - name: Commit and push mods.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mods.json
          git commit -m "Update mods.json from RSS feed" || echo "No changes to commit"
          git push