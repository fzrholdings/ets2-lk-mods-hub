name: Auto Sync Mods

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Run incremental sync
        run: python sync_mods_incremental.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mods.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update mods.json [skip ci]"
          git push

      - name: Trigger Cloudflare Pages Deploy
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/1e2fee64-fef5-45fa-a7ae-5b622dd4e6cb"
