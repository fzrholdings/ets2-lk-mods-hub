<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK ETS2/ATS Mods Hub</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        *{ box-sizing: border-box; }
        body{ background: #0a0f1e; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container{ max-width: 1400px; margin: auto; }
        h1{ color: #ffaa33; text-align: center; }
        .search-box{ width: 100%; padding: 12px; border-radius: 30px; border: none; margin: 20px 0; font-size: 16px; }
        .mod-grid{ display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .mod-card{ background: #1e2a3a; border-radius: 16px; width: 280px; padding: 15px; transition: 0.2s; }
        .mod-card img{ width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
        .download-btn{ background: #2ecc71; color: white; padding: 10px 15px; border-radius: 30px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; }
        .add-form{ background: #11181f; padding: 20px; border-radius: 20px; margin-top: 40px; }
        input, textarea, select{ width: 100%; margin: 8px 0; padding: 10px; border-radius: 12px; border: none; }
        button{ background: #ffaa33; padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚛 Sri Lanka ETS2 / ATS Mods Hub</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="Search mods... (Bus, Truck, Map, etc)">

    <div id="modsContainer" class="mod-grid"></div>

    <div class="add-form">
        <h3>➕ Add New Mod</h3>
        <input type="text" id="modName" placeholder="Mod name">
        <input type="text" id="modCategory" placeholder="Category (Buses / Trucks / Maps)">
        <input type="text" id="modVersion" placeholder="Game version (1.53 / 1.54)">
        <input type="text" id="modAuthor" placeholder="Author">
        <input type="text" id="modDownloadUrl" placeholder="Direct download link">
        <input type="text" id="modImageUrl" placeholder="Image URL (optional)">
        <textarea id="modDesc" rows="2" placeholder="Description"></textarea>
        <button onclick="addMod()">📥 Add Mod</button>
    </div>
</div>

<script>
    // 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG (from Step 3)
    const firebaseConfig = {
        apiKey: "AIzaSyA2TdxuK8ShYEVF4yi1Fg8KOfoY7ymWzkU",
        authDomain: "lk-ets2-mods-hub-ca78e.firebaseapp.com",
        projectId: "lk-ets2-mods-hub-ca78e",
        storageBucket: "lk-ets2-mods-hub-ca78e.firebasestorage.app",
        messagingSenderId: "784056421027",
        appId: "1:784056421027:web:0e0c894e0b0eed17934d16"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Anonymous login
    firebase.auth().signInAnonymously().catch(console.warn);

    function loadMods(search = "") {
        const container = document.getElementById("modsContainer");
        container.innerHTML = "Loading...";
        db.collection("mods").orderBy("timestamp", "desc").get().then(snapshot => {
            if(snapshot.empty) { container.innerHTML = "<p>No mods yet. Be the first to add!</p>"; return; }
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const m = doc.data();
                if(search && !m.name.toLowerCase().includes(search) && !m.category.toLowerCase().includes(search)) return;
                container.innerHTML += `
                    <div class="mod-card">
                        <img src="${m.imageUrl || 'https://via.placeholder.com/280x150?text=No+Image'}" onerror="this.src='https://via.placeholder.com/280x150?text=Image+Error'">
                        <h3>${escapeHtml(m.name)}</h3>
                        <p>📁 ${escapeHtml(m.category)} | 🎮 v${escapeHtml(m.gameVersion)}<br>✍️ ${escapeHtml(m.author)}</p>
                        <p>${escapeHtml(m.description || '')}</p>
                        <a href="${m.downloadUrl}" target="_blank" class="download-btn">⬇️ Direct Download</a>
                    </div>
                `;
            });
        }).catch(err => { console.error(err); container.innerHTML = "Error loading mods"; });
    }

    function addMod() {
        const name = document.getElementById("modName").value.trim();
        const category = document.getElementById("modCategory").value.trim();
        const version = document.getElementById("modVersion").value.trim();
        const author = document.getElementById("modAuthor").value.trim();
        const dlUrl = document.getElementById("modDownloadUrl").value.trim();
        const imgUrl = document.getElementById("modImageUrl").value.trim();
        const desc = document.getElementById("modDesc").value.trim();
        if(!name || !category || !version || !author || !dlUrl) {
            alert("Please fill name, category, version, author, and download link");
            return;
        }
        db.collection("mods").add({
            name, category, gameVersion: version, author, downloadUrl: dlUrl, imageUrl: imgUrl, description: desc,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Mod added!");
            loadMods();
            document.getElementById("modName").value = "";
            document.getElementById("modCategory").value = "";
            document.getElementById("modVersion").value = "";
            document.getElementById("modAuthor").value = "";
            document.getElementById("modDownloadUrl").value = "";
            document.getElementById("modImageUrl").value = "";
            document.getElementById("modDesc").value = "";
        }).catch(err => alert("Error: "+err.message));
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    document.getElementById("searchInput").addEventListener("keyup", (e) => loadMods(e.target.value.toLowerCase()));
    loadMods();
</script>
</body>
</html>
