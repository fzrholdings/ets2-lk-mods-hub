<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK ETS2 / ATS Mods Hub</title>
    
    <!-- No Firebase SDKs – mods are loaded from mods.json -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- Main title -->
    <h1>🚛 ETS2 / ATS Mods Hub</h1>
    
    <!-- Search bar -->
    <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search mods... (bus, truck, map)">
    </div>

    <!-- Mods grid -->
    <div id="modsContainer" class="mod-grid"></div>

    <!-- Add mod section removed – mods are auto-synced via GitHub Actions -->
    
    <footer>© LK Truckers Community</footer>
</div>

<!-- Modal for manual download bypass (iframe) -->
<div id="downloadModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <iframe id="modalIframe" src="about:blank" style="width:100%; height:80vh; border:none;"></iframe>
    </div>
</div>

<!-- Custom JavaScript (JSON version, no Firebase) -->
<script src="app.js"></script>
</body>
</html>
