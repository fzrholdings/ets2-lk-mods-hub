<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ETSCFM Mods Hub | ETS2 & ATS Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>ETSCFM Mods Hub</h1>
    </header>

    <div class="filter-bar">
        <div class="search-group">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search mods...">
        </div>
        <div class="filter-group">
            <select id="gameTypeFilter" class="filter-select">
                <option value="all">All Games</option>
                <option value="ETS2">ETS2</option>
                <option value="ATS">ATS</option>
            </select>
            <select id="versionFilter" class="filter-select">
                <option value="all">All Versions</option>
                <option value="1.59">1.59</option>
                <option value="1.58">1.58</option>
                <option value="1.57">1.57</option>
                <option value="1.56">1.56</option>
                <option value="1.55">1.55</option>
                <option value="1.54">1.54</option>
                <option value="1.53">1.53</option>
                <option value="1.52">1.52</option>
                <option value="1.51">1.51</option>
                <option value="1.50">1.50</option>
                <option value="1.49">1.49</option>
            </select>
        </div>
    </div>

    <div id="modsContainer" class="mod-grid"></div>

    <div class="pagination">
        <button id="prevPageBtn">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextPageBtn">Next</button>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content details-modal">
        <span class="close-btn details-close">&times;</span>
        <div id="detailsContent" class="details-container"></div>
    </div>
</div>

<div id="downloadModal" class="modal">
    <div class="modal-content iframe-modal">
        <span class="close-btn download-close">&times;</span>
        <iframe id="modalIframe" src="about:blank"></iframe>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
