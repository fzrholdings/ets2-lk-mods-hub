<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK ETS2/ATS Mods Hub</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🚛 LK ETS2 / ATS Mods Hub</h1>
    <div class="sub">Sri Lanka Truckers Community</div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search mods... (Bus, Truck, Map, etc)">

    <div id="modsContainer" class="mod-grid"></div>

    <div class="add-form">
        <h3>➕ Add New Mod</h3>
        <input type="text" id="modName" placeholder="Mod name">
        <input type="text" id="modCategory" placeholder="Category (Buses / Trucks / Maps)">
        <input type="text" id="modVersion" placeholder="Game version (1.53 / 1.54)">
        <input type="text" id="modAuthor" placeholder="Author">
        <input type="text" id="modDownloadUrl" placeholder="Direct download link">
        <input type="text" id="modImageUrl" placeholder="Image URL (optional)">
        <textarea id="modDesc" rows="2" placeholder="Description"></textarea>
        <button onclick="addMod()">📥 Add Mod</button>
    </div>
    <footer>© LK ETS2 Community • Mods are property of respective authors</footer>
</div>
<script src="app.js"></script>
</body>
</html>
