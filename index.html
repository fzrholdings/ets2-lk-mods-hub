<!-- index.html -->
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK ETS2 / ATS Mods Hub | Pitch Black & White</title>
    
    <!-- Google Fonts: Lato -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🚛 ETS2 / ATS Mods Hub</h1>
    
    <!-- Search bar -->
    <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search mods... (bus, truck, map)">
    </div>

    <!-- Mods grid -->
    <div id="modsContainer" class="mod-grid"></div>

    <!-- Pagination controls -->
    <div id="paginationControls">
        <button id="prevPageBtn" onclick="prevPage()">⬅️ පෙර පිටුව</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextPageBtn" onclick="nextPage()">ඊළඟ පිටුව ➡️</button>
    </div>
    
    <footer>© LK Truckers Community | pitch black & white edition</footer>
</div>

<!-- Modal for download bypass -->
<div id="downloadModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <iframe id="modalIframe" src="about:blank" style="width:100%; height:80vh; border:none;"></iframe>
    </div>
</div>

<script>
    // Global variables
    let allMods = [];
    let currentPage = 1;
    const modsPerPage = 24;
    let filteredMods = [];

    const modsContainer = document.getElementById('modsContainer');
    const searchInput = document.getElementById('searchInput');
    const pageInfoSpan = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');

    async function loadMods() {
        try {
            const response = await fetch('/mods.json');
            if (!response.ok) throw new Error('Failed to load mods.json');
            const data = await response.json();
            allMods = Array.isArray(data) ? data : [];
            filteredMods = [...allMods];
            currentPage = 1;
            renderCurrentPage();
        } catch (error) {
            console.error('Error loading mods:', error);
            modsContainer.innerHTML = '<div style="text-align:center; margin: 2rem;">⚠️ Could not load mods. Please try again later.</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrentPage() {
        if (!filteredMods.length) {
            modsContainer.innerHTML = '<div style="text-align:center; margin: 2rem;">🔍 No mods found. Try a different search.</div>';
            updatePaginationInfo();
            return;
        }

        const start = (currentPage - 1) * modsPerPage;
        const end = start + modsPerPage;
        const pageMods = filteredMods.slice(start, end);

        modsContainer.innerHTML = '';
        pageMods.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'mod-card';

            const imgUrl = mod.imageUrl && mod.imageUrl.trim() !== '' ? mod.imageUrl : 'https://via.placeholder.com/300x150?text=No+Image';
            const description = mod.description ? (mod.description.length > 100 ? mod.description.substring(0, 100) + '…' : mod.description) : 'No description available.';
            const gameVer = mod.gameVersion || 'N/A';
            const author = mod.author || 'ETS2 Mods';

            card.innerHTML = `
                <img src="${imgUrl}" alt="${escapeHtml(mod.name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x150?text=Image+Error'">
                <h3>${escapeHtml(mod.name)}</h3>
                <div class="mod-meta">📌 ${escapeHtml(gameVer)} | ✍️ ${escapeHtml(author)}</div>
                <div class="mod-desc">${escapeHtml(description)}</div>
                <a href="#" class="download-btn" data-url="${escapeHtml(mod.downloadUrl || '')}">📥 Download</a>
            `;
            modsContainer.appendChild(card);
        });

        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const url = btn.getAttribute('data-url');
                if (url && url !== '') {
                    openModalWithUrl(url);
                } else {
                    alert('Download link not available.');
                }
            });
        });

        updatePaginationInfo();
    }

    function updatePaginationInfo() {
        const totalPages = Math.ceil(filteredMods.length / modsPerPage);
        pageInfoSpan.innerText = `Page ${currentPage} of ${totalPages === 0 ? 1 : totalPages}`;
        if (prevBtn) prevBtn.disabled = (currentPage <= 1);
        if (nextBtn) nextBtn.disabled = (currentPage >= totalPages);
    }

    window.prevPage = function() {
        if (currentPage > 1) {
            currentPage--;
            renderCurrentPage();
        }
    };

    window.nextPage = function() {
        const totalPages = Math.ceil(filteredMods.length / modsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            renderCurrentPage();
        }
    };

    function setupSearch() {
        if (!searchInput) return;
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term === '') {
                filteredMods = [...allMods];
            } else {
                filteredMods = allMods.filter(mod => 
                    (mod.name && mod.name.toLowerCase().includes(term)) ||
                    (mod.author && mod.author.toLowerCase().includes(term)) ||
                    (mod.gameVersion && mod.gameVersion.toLowerCase().includes(term)) ||
                    (mod.category && mod.category.toLowerCase().includes(term))
                );
            }
            currentPage = 1;
            renderCurrentPage();
        });
    }

    function openModalWithUrl(url) {
        const modal = document.getElementById('downloadModal');
        const iframe = document.getElementById('modalIframe');
        if (modal && iframe) {
            iframe.src = url;
            modal.style.display = 'block';
        } else {
            window.open(url, '_blank');
        }
    }

    window.closeModal = function() {
        const modal = document.getElementById('downloadModal');
        const iframe = document.getElementById('modalIframe');
        if (modal) modal.style.display = 'none';
        if (iframe) iframe.src = 'about:blank';
    };

    window.onclick = function(event) {
        const modal = document.getElementById('downloadModal');
        if (event.target === modal) {
            closeModal();
        }
    };

    loadMods().then(() => setupSearch());
</script>
</body>
</html>
